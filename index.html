<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" 
    content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; 
             script-src * 'self' 'unsafe-inline' 'unsafe-eval'; 
             connect-src * 'self'; 
             img-src * 'self' data: blob:;
             frame-src *; 
             style-src * 'self' 'unsafe-inline';">
  <title>FairValueAuto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #0F172A; }
    #app-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      background: #0F172A;
    }
    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0F172A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 80px; height: 80px;
      background: #2563EB;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      font-size: 36px;
    }
    .splash-title { color: #fff; font-family: -apple-system, sans-serif; font-size: 24px; font-weight: 700; }
    .splash-sub { color: #94a3b8; font-family: -apple-system, sans-serif; font-size: 14px; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="splash">
    <div class="splash-logo">🚗</div>
    <div class="splash-title">FairValueAuto</div>
    <div class="splash-sub">AI-Powered Car Deal Finder</div>
  </div>
  <iframe 
    id="app-frame"
    src="https://velox-satisfied-deal-flow.base44.app"
    allow="camera; microphone; geolocation; notifications"
    allowfullscreen>
  </iframe>
  <script>
    const frame = document.getElementById('app-frame');
    const splash = document.getElementById('splash');
    frame.addEventListener('load', function() {
      setTimeout(() => splash.classList.add('hidden'), 800);
    });
    setTimeout(() => splash.classList.add('hidden'), 4000);
  </script>
</body>
</html>
